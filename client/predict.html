<!DOCTYPE html>
<html>

<head>

  <title>Traffic Risk Prediction</title>

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <h1>Traffic Risk Predictor</h1>

    <div class="navlinks">
      <a href="index.html">Home</a>
      <a href="predict.html">Prediction</a>
    </div>
  </div>


  <!-- MAIN -->
  <div class="container">

    <!-- INFO CARD -->
    <div class="card">
      <h2>Select Location on Map</h2>
      <p>Click anywhere on the map to automatically predict traffic risk based on real-time conditions.</p>
    </div>


    <!-- OPTIONAL CITY INPUT -->
    <div class="card">

      <h2>Or Enter City (Optional)</h2>

      <form id="predictionForm">

        <label>City</label>
        <input type="text" id="city" placeholder="Enter City Name">

        <button type="submit">
          Predict by City
        </button>

      </form>

    </div>


    <!-- RESULT -->
    <div class="card">
      <h2>Risk Result</h2>
      <div id="riskBox">Click on map to predict risk</div>
    </div>


    <!-- MAP -->
    <div class="card">
      <h2>Risk Zone Map</h2>
      <div id="map"></div>
    </div>


    <!-- CHART -->
    <div class="card">
      <h2>Risk Analytics</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>


  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Script -->
  <script src="script.js"></script>

</body>

</html>
